# CI: dependency scan → static security (Bandit) → pytest → Docker image build.
# Use GitHub Actions secrets for real JWT/AES in deploy; local/CI tests set env in test/conftest.py.
name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  security-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repository
      - uses: actions/checkout@v4
        with:
          # Needed for history-aware secret scanning.
          fetch-depth: 0

      # 2) Python toolchain
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3) Application dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4) Security scanners (Bandit + pip-audit are installed here, not pinned in requirements.txt)
      - name: Install security tooling
        run: pip install bandit pip-audit

      # 5) Dependency / supply-chain scan (quick audit via Python advisories)
      - name: Dependency scanning
        run: pip-audit -r requirements.txt

      # 6) Secret scanning with Gitleaks
      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7) OWASP Dependency-Check (deep CVE scan + HTML report artifact)
      - name: OWASP Dependency-Check
        run: |
          mkdir -p dependency-check-data dependency-check-report
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/dependency-check-data:/usr/share/dependency-check/data" \
            owasp/dependency-check:latest \
            --scan /src \
            --project hotel_backend \
            --out /src/dependency-check-report \
            --format HTML \
            --format JSON \
            --failOnCVSS 7

      - name: Upload OWASP report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: dependency-check-report/

      # 8) Static analysis on the Flask codebase (hardcoded secrets, unsafe patterns, SQL issues)
      - name: Security scanning (Bandit)
        run: bandit -r hotel_backend -c pyproject.toml

      # 9) Automated tests — must pass before image build
      - name: Run tests
        run: pytest

      # 10) Container build verification
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build .
