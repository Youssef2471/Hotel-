services:
  flask_app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    # Mount the Flask package so code changes apply without rebuild
    volumes:
      - ./hotel_backend:/app
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-use-env-or-dotenv}
      AES_KEY: ${AES_KEY:-change-this-aes-key-32-bytes!!!!}
      DATABASE_PATH: ${DATABASE_PATH:-/app/database.db}
    working_dir: /app
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: hotel_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - flask_app
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: hotel_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:
